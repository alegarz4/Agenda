<!doctype html>
<!-- Lumen Planner: PWA estatica para agenda personal de coordinacion. -->
<html lang="es">
<head>
  <!-- Metadatos base para Android, GitHub Pages e instalacion PWA. -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2457d6">
  <meta name="description" content="Lumen Planner, agenda de coordinacion para eventos, llamadas, casos especiales, notas importantes, calendario escolar y alertas.">

  <!-- Identidad de la aplicacion. -->
  <title>Lumen Planner</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./assets/icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png">

  <!-- Estilos separados por responsabilidad. -->
  <link rel="stylesheet" href="./src/css/theme.css">
  <link rel="stylesheet" href="./src/css/base.css">
  <link rel="stylesheet" href="./src/css/layout.css">
  <link rel="stylesheet" href="./src/css/components.css">
  <link rel="stylesheet" href="./src/css/responsive.css">
</head>
<body>
  <!-- Contenedor principal controlado por JavaScript. -->
  <div class="app-shell" data-app-shell>
    <!-- Encabezado fijo de marca, fecha y acciones globales. -->
    <header class="app-header">
      <a class="brand" href="#inicio" aria-label="Ir al inicio de Lumen Planner">
        <span class="brand-mark" aria-hidden="true">LP</span>
        <span>
          <strong>Lumen Planner</strong>
          <small>Agenda de coordinacion</small>
        </span>
      </a>

      <div class="header-status" aria-live="polite">
        <span data-current-date></span>
        <strong data-current-time></strong>
      </div>

      <button class="ghost-button" type="button" data-refresh-app>Actualizar</button>
    </header>

    <!-- Navegacion principal: cada pestana corresponde a una funcion real. -->
    <nav class="app-nav" aria-label="Secciones de Lumen Planner">
      <a href="#inicio" data-nav-link="inicio">Inicio</a>
      <a href="#agenda" data-nav-link="agenda">Agenda</a>
      <a href="#eventos" data-nav-link="eventos">Eventos</a>
      <a href="#llamadas" data-nav-link="llamadas">Llamadas</a>
      <a href="#casos" data-nav-link="casos">Casos</a>
      <a href="#notas" data-nav-link="notas">Notas</a>
      <a href="#sej" data-nav-link="sej">SEJ</a>
      <a href="#alertas" data-nav-link="alertas">Alertas</a>
      <a href="#respaldo" data-nav-link="respaldo">Respaldo</a>
    </nav>

    <!-- Punto de montaje para vistas renderizadas desde modulos ES6. -->
    <main class="app-main" id="main-content" data-view-root tabindex="-1"></main>
  </div>

  <!-- Dialogo unico para crear y editar registros de agenda. -->
  <dialog class="record-dialog" data-record-dialog>
    <form method="dialog" class="record-form" data-record-form>
      <header class="dialog-header">
        <div>
          <p class="eyebrow">Registro</p>
          <h2 data-dialog-title>Nuevo registro</h2>
        </div>
        <button class="icon-button" type="button" data-close-dialog aria-label="Cerrar">x</button>
      </header>

      <input type="hidden" name="id">

      <label>
        <span>Tipo</span>
        <select name="type" required>
          <option value="evento">Evento</option>
          <option value="llamada">Llamada</option>
          <option value="caso">Caso especial</option>
          <option value="nota">Nota importante</option>
          <option value="sej">Calendario SEJ</option>
          <option value="personal">Personal</option>
        </select>
      </label>

      <label>
        <span>Titulo</span>
        <input name="title" type="text" placeholder="Ej. Llamar a supervisión, reunión, caso pendiente" required>
      </label>

      <div class="form-grid">
        <label>
          <span>Fecha</span>
          <input name="date" type="date" required>
        </label>
        <label>
          <span>Hora</span>
          <input name="time" type="time">
        </label>
      </div>

      <div class="form-grid">
        <label>
          <span>Prioridad</span>
          <select name="priority">
            <option value="normal">Normal</option>
            <option value="alta">Alta</option>
            <option value="critica">Critica</option>
          </select>
        </label>
        <label>
          <span>Estado</span>
          <select name="status">
            <option value="pendiente">Pendiente</option>
            <option value="en_proceso">En proceso</option>
            <option value="espera">En espera</option>
            <option value="cerrado">Cerrado</option>
          </select>
        </label>
      </div>

      <label>
        <span>Persona, area o dependencia</span>
        <input name="person" type="text" placeholder="Nombre, area, dependencia o contacto">
      </label>

      <label>
        <span>Lugar o medio</span>
        <input name="place" type="text" placeholder="Oficina, telefono, WhatsApp, enlace, escuela">
      </label>

      <label>
        <span>Alerta</span>
        <select name="reminderMinutes">
          <option value="0">Sin alerta</option>
          <option value="15">15 minutos antes</option>
          <option value="30">30 minutos antes</option>
          <option value="60">1 hora antes</option>
          <option value="120">2 horas antes</option>
          <option value="1440">1 dia antes</option>
        </select>
      </label>

      <label>
        <span>Seguimiento</span>
        <textarea name="followUp" rows="3" placeholder="Que debo confirmar, enviar, revisar o cerrar despues"></textarea>
      </label>

      <label>
        <span>Notas importantes</span>
        <textarea name="notes" rows="5" placeholder="Contexto, acuerdos, indicaciones, fuente oficial o datos que no debo olvidar"></textarea>
      </label>

      <footer class="dialog-actions">
        <button class="secondary-button" type="button" data-close-dialog>Cancelar</button>
        <button class="primary-button" type="submit">Guardar</button>
      </footer>
    </form>
  </dialog>

  <!-- La app funciona en GitHub Pages con modulos ES6. -->
  <script type="module" src="./src/js/app.js"></script>
</body>
</html>
